services:
  neo4j:
    image: neo4j:5
    container_name: musicgraph-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"   # Neo4j Browser (UI web)
      - "7687:7687"   # Bolt (driver)
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: musicgraph-backend
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: musicgraph-frontend
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - backend
